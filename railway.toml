[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn webapp.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
releaseCommand = "python manage.py migrate --noinput && python manage.py compile_translations && python manage.py collectstatic --noinput"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
