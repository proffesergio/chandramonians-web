{% if messages %}
<div class="px-3 pt-2" style="max-width:900px;margin:0 auto;">
  {% for message in messages %}
    <div class="alert-custom alert-{{ message.tags|default:'info' }} fade-in-up">
      <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' or message.tags == 'danger' %}fa-exclamation-circle{% elif message.tags == 'warning' %}fa-exclamation-triangle{% else %}fa-info-circle{% endif %}"></i>
      <span>{{ message }}</span>
      <button type="button" onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;cursor:pointer;opacity:.6;font-size:1rem;">
        <i class="fas fa-times"></i>
      </button>
    </div>
  {% endfor %}
</div>
{% endif %}
